name: qa-midterm

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  midterm-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install root QA dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run qa:install:browsers

      - name: Prepare QA environment
        run: |
          if [ -f .env.qa.example ]; then
            cp .env.qa.example .env.qa
          elif [ -f .env.qa ]; then
            echo "Using tracked .env.qa"
          else
            echo "Neither .env.qa.example nor .env.qa exists" >&2
            exit 1
          fi

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run backend tests with coverage
        run: npm run qa:go:test:coverage

      - name: Run smoke suite with JSON report
        env:
          QA_RUN_API_SMOKE: "false"
          QA_RUN_API_TESTS: "false"
        run: npm run qa:test:smoke:json

      - name: Print smoke suite summary
        if: always()
        run: node scripts/print-playwright-failures.mjs logs/smoke-report.json || true

      - name: Run critical suite with JSON report
        env:
          QA_RUN_API_SMOKE: "false"
          QA_RUN_API_TESTS: "false"
        run: npm run qa:test:critical:json

      - name: Print critical suite summary
        if: always()
        run: node scripts/print-playwright-failures.mjs logs/critical-report.json || true

      - name: Run regression suite with JSON report
        env:
          QA_RUN_API_SMOKE: "false"
          QA_RUN_API_TESTS: "false"
        run: npm run qa:test:regression:json

      - name: Print regression suite summary
        if: always()
        run: node scripts/print-playwright-failures.mjs logs/regression-report.json || true

      - name: Run full E2E suite with JSON report
        env:
          QA_RUN_API_SMOKE: "false"
          QA_RUN_API_TESTS: "false"
        run: npm run qa:test:e2e:json

      - name: Print E2E suite summary
        if: always()
        run: node scripts/print-playwright-failures.mjs logs/e2e-report.json || true

      - name: Start backend stack for live API coverage
        working-directory: backend
        run: docker compose up -d pg redis migrator data-seeder app

      - name: Wait for backend metrics endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/metrics >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become ready in time" >&2
          docker compose -f backend/docker-compose.yaml ps >&2 || true
          exit 1

      - name: Wait for seeded auth readiness
        run: |
          QA_API_BASE_URL="$(grep '^QA_API_BASE_URL=' .env.qa | head -n 1 | cut -d= -f2-)"
          QA_API_LOGIN_PHONE="$(grep '^QA_API_LOGIN_PHONE=' .env.qa | head -n 1 | cut -d= -f2-)"
          QA_API_LOGIN_PASSWORD="$(grep '^QA_API_LOGIN_PASSWORD=' .env.qa | head -n 1 | cut -d= -f2-)"

          for attempt in $(seq 1 24); do
            response="$(curl -sS -X POST "${QA_API_BASE_URL}/auth/login" \
              -H 'Content-Type: application/json' \
              -d "{\"phone_number\":\"${QA_API_LOGIN_PHONE}\",\"password\":\"${QA_API_LOGIN_PASSWORD}\"}")"

            if printf '%s' "$response" | grep -q '"access_token"'; then
              exit 0
            fi

            sleep 5
          done

          echo "Seeded auth user did not become ready in time" >&2
          echo "Last login response: $response" >&2
          docker compose -f backend/docker-compose.yaml ps >&2 || true
          docker compose -f backend/docker-compose.yaml logs --no-color data-seeder app >&2 || true
          exit 1

      - name: Run live API suite with JSON report
        env:
          QA_RUN_API_SMOKE: "true"
          QA_RUN_API_TESTS: "true"
        run: npm run qa:test:api:json

      - name: Print API suite summary
        if: always()
        run: node scripts/print-playwright-failures.mjs logs/api-report.json || true

      - name: Generate midterm metrics artifacts
        run: npm run qa:metrics

      - name: Enforce quality gates
        run: npm run qa:quality-gates

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-midterm-artifacts
          path: |
            playwright-report
            test-results
            logs
            evidence/charts
            qa-docs/tables
          if-no-files-found: ignore

      - name: Dump backend stack logs on failure
        if: failure()
        working-directory: backend
        run: docker compose logs --no-color || true

      - name: Stop backend stack
        if: always()
        working-directory: backend
        run: docker compose down -v || true
